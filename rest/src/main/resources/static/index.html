<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusStaff - Employee Management Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0b0f19;
            --bg-secondary: #111827;
            --bg-card: rgba(17, 24, 39, 0.7);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-primary: #f3f4f6;
            --text-secondary: #9ca3af;
            --accent-purple: #8b5cf6;
            --accent-blue: #3b82f6;
            --accent-emerald: #10b981;
            --accent-rose: #f43f5e;
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.3), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            background-image: 
                radial-gradient(at 0% 0%, rgba(139, 92, 246, 0.12) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(59, 130, 246, 0.12) 0px, transparent 50%);
        }

        header {
            padding: 1.5rem 4rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            background: rgba(11, 15, 25, 0.5);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-blue));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.4);
        }

        .logo-icon svg {
            width: 20px;
            height: 20px;
            fill: white;
        }

        .logo-text {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            margin: 2rem auto;
            padding: 0 2rem;
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 2rem;
        }

        @media (max-width: 900px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        /* Glassmorphic Cards */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 2rem;
            box-shadow: var(--shadow-lg);
            backdrop-filter: blur(16px);
            transition: var(--transition);
        }

        .card:hover {
            border-color: rgba(139, 92, 246, 0.2);
        }

        .card-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #fff;
        }

        /* Forms & Inputs */
        .input-group {
            margin-bottom: 1.25rem;
        }

        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: 500;
        }

        .text-input {
            width: 100%;
            padding: 0.75rem 1rem;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            background: rgba(0, 0, 0, 0.2);
            color: #fff;
            font-family: inherit;
            font-size: 0.95rem;
            outline: none;
            transition: var(--transition);
        }

        .text-input:focus {
            border-color: var(--accent-purple);
            box-shadow: 0 0 0 2px rgba(139, 92, 246, 0.2);
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            border: none;
            font-family: inherit;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            text-decoration: none;
            font-size: 0.95rem;
            width: 100%;
        }

        .btn-sm {
            padding: 0.5rem 1rem;
            font-size: 0.85rem;
            border-radius: 8px;
            width: auto;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-blue));
            color: #fff;
            box-shadow: 0 4px 14px rgba(139, 92, 246, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(139, 92, 246, 0.4);
        }

        .btn-danger {
            background: rgba(244, 63, 94, 0.1);
            color: var(--accent-rose);
            border: 1px solid rgba(244, 63, 94, 0.2);
        }

        .btn-danger:hover {
            background: var(--accent-rose);
            color: #fff;
        }

        .btn-secondary {
            background: rgba(59, 130, 246, 0.1);
            color: var(--accent-blue);
            border: 1px solid rgba(59, 130, 246, 0.2);
        }

        .btn-secondary:hover {
            background: var(--accent-blue);
            color: #fff;
        }

        .btn-accent {
            background: rgba(16, 185, 129, 0.1);
            color: var(--accent-emerald);
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .btn-accent:hover {
            background: var(--accent-emerald);
            color: #fff;
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        @media (max-width: 600px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 1.25rem;
            text-align: center;
        }

        .stat-value {
            font-size: 1.75rem;
            font-weight: 700;
            color: #fff;
            margin-top: 0.25rem;
            background: linear-gradient(135deg, #fff, #cbd5e1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stat-label {
            font-size: 0.8rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* Table design */
        .table-container {
            width: 100%;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            padding: 1rem 1.5rem;
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-bottom: 1px solid var(--border-color);
        }

        td {
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid var(--border-color);
            vertical-align: middle;
            font-size: 0.95rem;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background: rgba(255, 255, 255, 0.02);
        }

        .actions-cell {
            display: flex;
            gap: 0.5rem;
        }

        /* Avatar or Info block */
        .employee-info {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .employee-avatar {
            width: 36px;
            height: 36px;
            background: rgba(139, 92, 246, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent-purple);
            font-weight: 600;
            border: 1px solid rgba(139, 92, 246, 0.2);
        }

        /* Modals */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            align-items: center;
            justify-content: center;
            z-index: 1000;
            animation: fadeIn 0.2s ease-out;
        }

        .modal-content {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 2rem;
            width: 100%;
            max-width: 450px;
            box-shadow: var(--shadow-lg);
            position: relative;
        }

        .modal-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 1.25rem;
            color: #fff;
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 0.75rem;
            margin-top: 1.5rem;
        }

        .close-btn {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.5rem;
            cursor: pointer;
            transition: var(--transition);
        }

        .close-btn:hover {
            color: #fff;
        }

        /* Toast Notifications */
        .toast-container {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            z-index: 10000;
        }

        .toast {
            background: rgba(17, 24, 39, 0.9);
            border: 1px solid var(--border-color);
            padding: 1rem 1.5rem;
            border-radius: 12px;
            color: #fff;
            box-shadow: var(--shadow-lg);
            display: flex;
            align-items: center;
            gap: 0.75rem;
            min-width: 280px;
            animation: slideIn 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(8px);
        }

        .toast-success {
            border-left: 4px solid var(--accent-emerald);
        }

        .toast-error {
            border-left: 4px solid var(--accent-rose);
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Loader */
        .loader {
            border: 3px solid rgba(255, 255, 255, 0.05);
            border-top: 3px solid var(--accent-purple);
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            margin: auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <div class="logo-icon">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="white">
                    <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                </svg>
            </div>
            <span class="logo-text">NexusStaff</span>
        </div>
    </header>

    <div class="container">
        
        <!-- Left Side: Add Form -->
        <div class="card" style="height: fit-content;">
            <h2 class="card-title">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                    <circle cx="8.5" cy="7" r="4"/>
                    <line x1="20" y1="8" x2="20" y2="14"/>
                    <line x1="23" y1="11" x2="17" y2="11"/>
                </svg>
                Register Employee
            </h2>
            <form id="addEmployeeForm" onsubmit="addEmployee(event)">
                <div class="input-group">
                    <label for="nameInput">Full Name</label>
                    <input type="text" id="nameInput" class="text-input" placeholder="e.g. Dinesh Kumar" required autocomplete="off">
                </div>
                <div class="input-group">
                    <label for="deptInput">Department</label>
                    <input type="text" id="deptInput" class="text-input" placeholder="e.g. Engineering" required autocomplete="off">
                </div>
                <div class="input-group">
                    <label for="salaryInput">Monthly Salary (INR)</label>
                    <input type="number" step="0.01" id="salaryInput" class="text-input" placeholder="e.g. 75000" required autocomplete="off">
                </div>
                <button type="submit" class="btn btn-primary">
                    Create Record
                </button>
            </form>
        </div>

        <!-- Right Side: Stats & Employee Table -->
        <div>
            <!-- Stats -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">Total Staff</div>
                    <div class="stat-value" id="statCount">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Expenses</div>
                    <div class="stat-value" id="statExpenses">₹0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Avg Salary</div>
                    <div class="stat-value" id="statAverage">₹0</div>
                </div>
            </div>

            <!-- List Card -->
            <div class="card">
                <h2 class="card-title">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                        <circle cx="9" cy="7" r="4"/>
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                        <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                    </svg>
                    Employee Directory
                </h2>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Department</th>
                                <th>Salary</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="employeeTableBody">
                            <tr>
                                <td colspan="4" style="text-align: center; padding: 2rem;">
                                    <div class="loader"></div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <button class="close-btn" onclick="closeEditModal()">&times;</button>
            <h3 class="modal-title">Edit Employee</h3>
            <form id="editEmployeeForm" onsubmit="updateEmployee(event)">
                <input type="hidden" id="editId">
                <div class="input-group">
                    <label for="editName">Full Name</label>
                    <input type="text" id="editName" class="text-input" required autocomplete="off">
                </div>
                <div class="input-group">
                    <label for="editDept">Department</label>
                    <input type="text" id="editDept" class="text-input" required autocomplete="off">
                </div>
                <div class="input-group">
                    <label for="editSalary">Monthly Salary (INR)</label>
                    <input type="number" step="0.01" id="editSalary" class="text-input" required autocomplete="off">
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-danger btn-sm" onclick="closeEditModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary btn-sm">Update Employee</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <script>
        const API_URL = '/employee';

        // Load employees on startup
        document.addEventListener('DOMContentLoaded', fetchEmployees);

        // Fetch all employees
        async function fetchEmployees() {
            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error('Failed to load employees');
                const employees = await response.ok ? await response.json() : [];
                renderTable(employees);
                updateStats(employees);
            } catch (error) {
                showToast(error.message, 'error');
                document.getElementById('employeeTableBody').innerHTML = `
                    <tr>
                        <td colspan="4" style="text-align: center; color: var(--accent-rose); padding: 2rem;">
                            Error loading database records. Check connection.
                        </td>
                    </tr>
                `;
            }
        }

        // Render Table Rows
        function renderTable(employees) {
            const tbody = document.getElementById('employeeTableBody');
            tbody.innerHTML = '';

            if (employees.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="4" style="text-align: center; color: var(--text-secondary); padding: 3rem;">
                            No employee records found. Register one to get started!
                        </td>
                    </tr>
                `;
                return;
            }

            employees.forEach(emp => {
                const initials = emp.name.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>
                        <div class="employee-info">
                            <div class="employee-avatar">${initials}</div>
                            <div>
                                <div style="font-weight: 600; color: #fff;">${emp.name}</div>
                                <div style="font-size: 0.8rem; color: var(--text-secondary);">ID: ${emp.id}</div>
                            </div>
                        </div>
                    </td>
                    <td><span style="background: rgba(59, 130, 246, 0.08); color: var(--accent-blue); padding: 0.25rem 0.6rem; border-radius: 6px; font-size: 0.85rem; font-weight: 500;">${emp.dept}</span></td>
                    <td style="font-weight: 600; color: #fff;">₹${emp.salary.toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}</td>
                    <td>
                        <div class="actions-cell">
                            <button class="btn btn-secondary btn-sm" onclick="openEditModal(${emp.id}, '${emp.name.replace(/'/g, "\\'")}', '${emp.dept.replace(/'/g, "\\'")}', ${emp.salary})">
                                Edit
                            </button>
                            <button class="btn btn-danger btn-sm" onclick="deleteEmployee(${emp.id})">
                                Delete
                            </button>
                        </div>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        // Update Statistics Panel
        function updateStats(employees) {
            const count = employees.length;
            const total = employees.reduce((sum, emp) => sum + emp.salary, 0);
            const avg = count > 0 ? (total / count) : 0;

            document.getElementById('statCount').innerText = count;
            document.getElementById('statExpenses').innerText = '₹' + Math.round(total).toLocaleString('en-IN');
            document.getElementById('statAverage').innerText = '₹' + Math.round(avg).toLocaleString('en-IN');
        }

        // Add Employee
        async function addEmployee(event) {
            event.preventDefault();
            const name = document.getElementById('nameInput').value;
            const dept = document.getElementById('deptInput').value;
            const salary = parseFloat(document.getElementById('salaryInput').value);

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, dept, salary })
                });

                if (!response.ok) throw new Error('Could not register employee.');

                showToast('Registered employee successfully!', 'success');
                document.getElementById('addEmployeeForm').reset();
                fetchEmployees();
            } catch (error) {
                showToast(error.message, 'error');
            }
        }

        // Open Edit Modal
        const editModal = document.getElementById('editModal');
        function openEditModal(id, name, dept, salary) {
            document.getElementById('editId').value = id;
            document.getElementById('editName').value = name;
            document.getElementById('editDept').value = dept;
            document.getElementById('editSalary').value = salary;
            editModal.style.display = 'flex';
        }

        function closeEditModal() {
            editModal.style.display = 'none';
        }

        // Update Employee
        async function updateEmployee(event) {
            event.preventDefault();
            const id = document.getElementById('editId').value;
            const name = document.getElementById('editName').value;
            const dept = document.getElementById('editDept').value;
            const salary = parseFloat(document.getElementById('editSalary').value);

            try {
                const response = await fetch(`${API_URL}/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, dept, salary })
                });

                if (!response.ok) throw new Error('Could not update employee details.');

                showToast('Updated employee successfully!', 'success');
                closeEditModal();
                fetchEmployees();
            } catch (error) {
                showToast(error.message, 'error');
            }
        }

        // Delete Employee
        async function deleteEmployee(id) {
            if (!confirm('Are you sure you want to delete this employee?')) return;

            try {
                const response = await fetch(`${API_URL}/${id}`, {
                    method: 'DELETE'
                });

                if (!response.ok) throw new Error('Could not remove employee.');

                showToast('Employee deleted successfully.', 'success');
                fetchEmployees();
            } catch (error) {
                showToast(error.message, 'error');
            }
        }

        // Toast Helper
        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            
            const icon = type === 'success' ? 
                `<svg width="18" height="18" fill="var(--accent-emerald)" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/></svg>` :
                `<svg width="18" height="18" fill="var(--accent-rose)" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/></svg>`;

            toast.innerHTML = `${icon}<span>${message}</span>`;
            container.appendChild(toast);

            setTimeout(() => {
                toast.style.animation = 'fadeOut 0.3s forwards';
                toast.addEventListener('animationend', () => toast.remove());
            }, 3000);
        }

        // Close modal when clicking outside
        window.onclick = function(event) {
            if (event.target === editModal) {
                closeEditModal();
            }
        }
    </script>
</body>
</html>
